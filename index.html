<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инструменты для схем</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Инструменты для схем</h1>
            <p>Обработка SVG-схем</p>
        </div>

        <!-- Табы -->
        <div class="tabs">
            <button class="tab active" data-tab="ya">Ya.Schema</button>
            <button class="tab" data-tab="ts">TS.Schema</button>
            <button class="tab" data-tab="q">Q.Schema</button>
        </div>

        <!-- Основной контент -->
        <div class="main-content">
            <!-- Левая панель -->
            <div class="left-panel">
                <!-- Панель Ya.Schema -->
                <div class="tab-panel" id="panel-ya">
                    <div class="input-group">
                        <label>SVG-подложка (JSON с полем result):</label>
                        <textarea id="ya-svg" placeholder='{"result":"&lt;svg&gt;..."}'></textarea>
                    </div>
                    <div class="input-group">
                        <label>Данные с местами (JSON с levels):</label>
                        <textarea id="ya-json" placeholder='{"stage":{},"levels":[]}'></textarea>
                    </div>
                    <button class="btn primary" onclick="processYa()">Объединить</button>
                    <button class="btn" id="ya-download" style="display:none;" onclick="downloadYa()">Скачать SVG</button>
                    <button class="btn" onclick="clearYa()">Очистить</button>
                    <div class="info-text">
                        <p>Группы: каждый стол в отдельной группе</p>
                        <p>Контуры: id="Контур_1" внутри группы</p>
                        <p>Места: id="Ряд_n|a-a", радиус 5px</p>
                    </div>
                </div>

                <!-- Панель TS.Schema -->
                <div class="tab-panel" id="panel-ts" style="display:none;">
                    <div class="file-upload" id="ts-dropzone">
                        <p>Перетащите SVG-файл сюда</p>
                        <small>или нажмите для выбора</small>
                    </div>
                    <input type="file" id="ts-file" accept=".svg" style="display:none;">
                    <div class="input-group">
                        <label>Или вставьте SVG-код:</label>
                        <textarea id="ts-svg" placeholder="<svg>..."></textarea>
                    </div>
                    <div class="options">
                        <div class="option">
                            <input type="checkbox" id="ts-flatten" checked>
                            <label for="ts-flatten">Убрать группы рядов</label>
                        </div>
                        <div class="option">
                            <input type="checkbox" id="ts-fix-ids" checked>
                            <label for="ts-fix-ids">Исправить ID мест</label>
                        </div>
                        <div class="option">
                            <input type="checkbox" id="ts-fix-contours" checked>
                            <label for="ts-fix-contours">Очистить ID контуров</label>
                        </div>
                    </div>
                    <button class="btn primary" onclick="processTs()">Обработать</button>
                    <button class="btn" id="ts-download" style="display:none;" onclick="downloadTs()">Скачать SVG</button>
                    <button class="btn" onclick="clearTs()">Очистить</button>
                </div>

                <!-- Панель Q.Schema -->
                <div class="tab-panel" id="panel-q" style="display:none;">
                    <div class="file-upload" id="q-dropzone">
                        <p>Загрузите SVG-схему</p>
                    </div>
                    <input type="file" id="q-file" accept=".svg" style="display:none;">
                    <div class="input-group">
                        <label>Код с координатами:</label>
                        <textarea id="q-code" placeholder="Вставьте весь код из файла..."></textarea>
                    </div>
                    <div class="input-group">
                        <label>JSON статусов (опционально):</label>
                        <textarea id="q-seats" placeholder='{"ordered_seats":{}}'></textarea>
                    </div>
                    <button class="btn primary" onclick="processQ()">Создать схему</button>
                    <button class="btn" id="q-download" style="display:none;" onclick="downloadQ()">Скачать SVG</button>
                    <button class="btn" onclick="clearQ()">Очистить</button>
                </div>
            </div>

            <!-- Правая панель (превью) -->
            <div class="right-panel">
                <div id="previewContainer"></div>
            </div>
        </div>

        <!-- Статус -->
        <div class="stats" id="status"></div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/ya-schema.js"></script>
    <script src="js/ts-schema.js"></script>
    <script src="js/q-schema.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
